<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Frontend Enhancement Project</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <div id="navbar"></div>

  <div class="page-hero">
    <h1>Say <em>Hello</em></h1>
  </div>

  <div class="page-content">
    <p>Have questions about the project? Reach out below.</p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="e.g. Jeremiah" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="What's on your mind?" required></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message ↗</button>
    </form>
  </div>

  <div id="footer"></div>

  <script src="../assets/js/script.js"></script>
</body>
</html>

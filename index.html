<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Enhancement Project</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fa;
      color: #333;
    }

    /* Navbar */
    .navbar {
      background: #2c3e50;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #1abc9c;
    }

    /* Main Content */
    .container {
      text-align: center;
      padding: 80px 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      background: #1abc9c;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a085;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .modal-content {
      background: white;
      margin: 15% auto;
      padding: 30px;
      width: 80%;
      max-width: 400px;
      border-radius: 10px;
      text-align: center;
      animation: fadeIn 0.4s;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      background: #2c3e50;
      color: white;
      margin-top: 50px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 15px;
      }

      .nav-links {
        flex-direction: column;
        text-align: center;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <h2 class="logo">My Project</h2>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="container">
    <h1>Welcome to the Project</h1>
    <p>Enhance this frontend with better UI and functionality!</p>

    <button id="openModalBtn">Click Me</button>
  </main>

  <!-- Modal -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Hello!</h2>
      <p>This is a modern popup modal.</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Frontend Enhancement Project</p>
  </footer>

  <script>
    const modal = document.getElementById("myModal");
    const btn = document.getElementById("openModalBtn");
    const closeBtn = document.querySelector(".close");

    btn.onclick = function () {
      modal.style.display = "block";
    };

    closeBtn.onclick = function () {
      modal.style.display = "none";
    };

    window.onclick = function (event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    };
  </script>

</body>
</html>

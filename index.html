<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Enhancement Project</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Body */
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Navbar */
#navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.7);
  color: #fff;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  backdrop-filter: blur(10px);
  z-index: 1000;
}

/* Main */
main {
  flex: 1;
  margin-top: 100px;
  text-align: center;
  padding: 20px;
}

/* Heading */
h1 {
  font-size: 2.8rem;
  color: white;
  margin-bottom: 10px;
  animation: fadeIn 1s ease-in-out;
}

/* Paragraph */
p {
  font-size: 1.2rem;
  color: #f1f1f1;
  margin-bottom: 20px;
  animation: fadeIn 1.5s ease-in-out;
}

/* Button */
button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #333;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* Button Hover */
button:hover {
  background: #333;
  color: white;
  transform: scale(1.1);
}

/* Footer */
#footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.7);
  color: white;
  text-align: center;
  padding: 10px;
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <main>
    <h1>Welcome to the Project</h1>
    <p>Enhance this frontend!</p>

    <button onclick="showAlert()">Click Me</button>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="assets/js/script.js"></script>
  <script>
  // Alert function
function showAlert() {
  alert("🚀 Button clicked! Keep enhancing!");
}

// Navbar
document.getElementById("navbar").innerHTML = `
  <strong>🚀 Frontend Enhancement Project</strong>
`;

// Footer
document.getElementById("footer").innerHTML = `
  <small>© 2026 Your Name | Built with ❤️</small>
`;

// Dark mode toggle button (injected)
const toggleBtn = document.createElement("div");
toggleBtn.className = "toggle-btn";
toggleBtn.innerText = "🌙 Dark Mode";

document.body.appendChild(toggleBtn);

// Toggle logic
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    toggleBtn.innerText = "☀️ Light Mode";
  } else {
    toggleBtn.innerText = "🌙 Dark Mode";
  }
});
</script>
</body>
</html>

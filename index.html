<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Enhancement Project</title>
  <style>
    /* General Styles */
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    main {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      color: #7f8c8d;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.3s ease;
    }

    button:hover {
      background-color: #3498db;
      transform: scale(1.1);
    }

    /* Navbar Styles */
    #navbar {
      background-color: #2c3e50;
      padding: 10px;
      text-align: center;
    }

    #navbar ul {
      list-style-type: none;
      padding: 0;
    }

    #navbar li {
      display: inline;
      margin-right: 20px;
    }

    #navbar a {
      color: white;
      text-decoration: none;
    }

    #navbar a:hover {
      text-decoration: underline;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.4);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
    }

    .close {
      color: #aaa;
      font-size: 28px;
      font-weight: bold;
      position: absolute;
      right: 10px;
      top: 0;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    /* Responsive Styles */
    @media screen and (max-width: 768px) {
      main {
        padding: 15px;
      }

      h1 {
        font-size: 2rem;
      }

      button {
        width: 100%;
        font-size: 1.2rem;
      }

      #navbar ul {
        text-align: center;
      }

      #navbar li {
        display: block;
        margin: 10px 0;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div id="navbar">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>

  <main>
    <h1>Welcome to the Project</h1>
    <p>Enhance this frontend!</p>

    <button onclick="showAlert()">Click Me</button>
  </main>

  <!-- Modal -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>This is a modal popup!</p>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <p>Footer content here</p>
  </div>

  <script>
    // JavaScript for modal functionality
    function showAlert() {
      var modal = document.getElementById("myModal");
      modal.style.display = "block";
    }

    var close = document.getElementsByClassName("close")[0];

    close.onclick = function () {
      var modal = document.getElementById("myModal");
      modal.style.display = "none";
    }

    window.onclick = function (event) {
      var modal = document.getElementById("myModal");
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }
  </script>

</body>

</html>
